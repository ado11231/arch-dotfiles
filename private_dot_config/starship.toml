add_newline = false

[line_break]
disabled = true

# Prompt character (the ❯): white on success, red after a failed command
[character]
success_symbol = "[❯](bold white)"
error_symbol = "[❯](bold red)"

# Command duration ("took 3s"): subtle dimmed gray
[cmd_duration]
style = "dimmed white"
format = "[took $duration]($style) "
